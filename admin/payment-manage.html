<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로그램비 지급 관리 - 남원시 농촌관광</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <div class="sidebar-overlay" onclick="Utils.closeSidebar()"></div>
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>&#127793; 남원시 농촌관광</h2>
        <div class="user-info" id="userInfo">관리자</div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-section">관리</div>
        <a class="nav-item" href="dashboard.html"><span class="icon">&#128202;</span> 대시보드</a>
        <a class="nav-item" href="business-manage.html"><span class="icon">&#127970;</span> 경영체 관리</a>
        <a class="nav-item" href="program-manage.html"><span class="icon">&#127915;</span> 프로그램 관리</a>
        <div class="nav-section">견적/청구</div>
        <a class="nav-item" href="estimate-review.html"><span class="icon">&#128196;</span> 견적서 검토</a>
        <a class="nav-item" href="invoice-review.html"><span class="icon">&#128203;</span> 청구서 검토</a>
        <div class="nav-section">정산</div>
        <a class="nav-item active" href="payment-manage.html"><span class="icon">&#128179;</span> 프로그램비 지급</a>
        <a class="nav-item" href="marketing-fee.html"><span class="icon">&#128176;</span> 공동마케팅비</a>
        <a class="nav-item" href="membership-fee.html"><span class="icon">&#128181;</span> 회비 관리</a>
        <div class="nav-section">기타</div>
        <a class="nav-item" href="event-manage.html"><span class="icon">&#128197;</span> 행사 관리</a>
      </div>
    </nav>

    <div class="main-content">
      <header class="top-header">
        <div class="d-flex align-center gap-1">
          <button class="menu-toggle" onclick="Utils.toggleSidebar()">&#9776;</button>
          <span class="page-title">프로그램비 지급 관리</span>
        </div>
        <div class="header-actions">
          <button class="btn btn-outline btn-sm" onclick="Auth.logout()">로그아웃</button>
        </div>
      </header>

      <div class="page-content">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">&#128179;</div>
            <div class="stat-value" id="statTotal">0원</div>
            <div class="stat-label">총 지급 금액</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#9989;</div>
            <div class="stat-value" id="statPaid">0건</div>
            <div class="stat-label">결제 완료</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#9200;</div>
            <div class="stat-value" id="statUnpaid">0건</div>
            <div class="stat-label">미결제</div>
          </div>
        </div>

        <div class="filter-bar">
          <select class="form-control" style="width:auto;min-width:130px" id="filterStatus" onchange="filterList()">
            <option value="">전체 상태</option>
            <option value="미결제">미결제</option>
            <option value="결제완료">결제완료</option>
          </select>
          <button class="btn btn-primary" onclick="openAddModal()">+ 지급 등록</button>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>프로그램비 지급 목록 (<span id="totalCount">0</span>건)</h3>
          </div>
          <div class="card-body">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>지급ID</th>
                    <th>청구서ID</th>
                    <th>경영체명</th>
                    <th>지급금액</th>
                    <th>결제수단</th>
                    <th>결제일</th>
                    <th>결제상태</th>
                    <th>관리</th>
                  </tr>
                </thead>
                <tbody id="paymentList">
                  <tr><td colspan="8" class="text-center text-muted">데이터를 불러오는 중...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 지급 등록/수정 모달 -->
  <div class="modal-overlay" id="paymentModal">
    <div class="modal" style="max-width:500px">
      <div class="modal-header">
        <h3 id="modalTitle">프로그램비 지급 등록</h3>
        <button class="modal-close" onclick="Utils.closeModal('paymentModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="paymentForm">
          <input type="hidden" name="지급ID" id="editPaymentId">
          <div class="form-group">
            <label class="required">청구서 ID</label>
            <input type="text" name="청구서ID" class="form-control" required placeholder="INV-XXXXXX">
          </div>
          <div class="form-group">
            <label class="required">경영체</label>
            <select name="경영체ID" class="form-control" required id="modalBusinessSelect">
              <option value="">경영체 선택</option>
            </select>
          </div>
          <div class="form-group">
            <label class="required">지급금액 (원)</label>
            <input type="number" name="지급금액" class="form-control" required placeholder="상품가의 30%">
          </div>
          <div class="form-group">
            <label>결제수단</label>
            <input type="text" name="결제수단" class="form-control" value="이나라도움카드" readonly>
          </div>
          <div class="form-group">
            <label>결제일</label>
            <input type="date" name="결제일" class="form-control">
          </div>
          <div class="form-group">
            <label>결제상태</label>
            <select name="결제상태" class="form-control">
              <option value="미결제">미결제</option>
              <option value="결제완료">결제완료</option>
            </select>
          </div>
          <div class="form-group">
            <label>비고</label>
            <textarea name="비고" class="form-control" rows="2"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="Utils.closeModal('paymentModal')">취소</button>
        <button class="btn btn-primary" onclick="savePayment()">저장</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (!Auth.requireAuth('admin')) window.location.href = '../index.html';
    document.getElementById('userInfo').textContent = Auth.getUserName() + ' (관리자)';

    let allPayments = [];
    let allBusinesses = [];

    async function loadData() {
      try {
        const [payResult, bizResult] = await Promise.all([
          API.getPaymentList(),
          API.getBusinessList()
        ]);
        allPayments = payResult.data || [];
        allBusinesses = bizResult.data || [];

        const select = document.getElementById('modalBusinessSelect');
        allBusinesses.filter(b => b['상태'] === '활성').forEach(b => {
          select.innerHTML += `<option value="${b['경영체ID']}">${b['경영체명']}</option>`;
        });

        updateStats();
        renderList(allPayments);
      } catch (error) {
        document.getElementById('paymentList').innerHTML =
          '<tr><td colspan="8" class="text-center text-muted">API 연결 후 데이터가 표시됩니다.</td></tr>';
      }
    }

    function getBizName(id) {
      const b = allBusinesses.find(b => b['경영체ID'] === id);
      return b ? b['경영체명'] : id || '-';
    }

    function updateStats() {
      const paid = allPayments.filter(p => p['결제상태'] === '결제완료');
      const unpaid = allPayments.filter(p => p['결제상태'] === '미결제');
      const total = paid.reduce((sum, p) => sum + Number(p['지급금액'] || 0), 0);
      document.getElementById('statTotal').textContent = Utils.formatCurrency(total);
      document.getElementById('statPaid').textContent = paid.length + '건';
      document.getElementById('statUnpaid').textContent = unpaid.length + '건';
    }

    function renderList(data) {
      document.getElementById('totalCount').textContent = data.length;
      const tbody = document.getElementById('paymentList');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">지급 내역이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(p => `
        <tr>
          <td>${p['지급ID']}</td>
          <td>${p['청구서ID']}</td>
          <td><strong>${getBizName(p['경영체ID'])}</strong></td>
          <td class="text-right">${Utils.formatCurrency(p['지급금액'])}</td>
          <td>${p['결제수단']}</td>
          <td>${Utils.formatDate(p['결제일'])}</td>
          <td>${Utils.getBadgeHtml(p['결제상태'])}</td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="editPayment('${p['지급ID']}')">수정</button>
          </td>
        </tr>
      `).join('');
    }

    function filterList() {
      const status = document.getElementById('filterStatus').value;
      let filtered = allPayments;
      if (status) filtered = filtered.filter(p => p['결제상태'] === status);
      renderList(filtered);
    }

    function openAddModal() {
      document.getElementById('modalTitle').textContent = '프로그램비 지급 등록';
      document.getElementById('paymentForm').reset();
      document.getElementById('editPaymentId').value = '';
      document.querySelector('[name="결제수단"]').value = '이나라도움카드';
      Utils.openModal('paymentModal');
    }

    function editPayment(paymentId) {
      const p = allPayments.find(p => p['지급ID'] === paymentId);
      if (!p) return;
      document.getElementById('modalTitle').textContent = '프로그램비 지급 수정';
      Utils.fillForm('paymentForm', p);
      document.getElementById('editPaymentId').value = paymentId;
      Utils.openModal('paymentModal');
    }

    async function savePayment() {
      const data = Utils.getFormData('paymentForm');
      if (!data['청구서ID'] || !data['경영체ID'] || !data['지급금액']) {
        Utils.showToast('필수 항목을 입력하세요.', 'warning');
        return;
      }
      Utils.showLoading();
      try {
        await API.processPayment(data);
        Utils.showToast('저장되었습니다.', 'success');
        Utils.closeModal('paymentModal');
        const result = await API.getPaymentList();
        allPayments = result.data || [];
        updateStats();
        filterList();
      } catch (error) {
        Utils.showToast(error.message, 'error');
      } finally {
        Utils.hideLoading();
      }
    }

    loadData();
  </script>
</body>
</html>
