<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로그램 관리 - 남원시 농촌관광</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <div class="sidebar-overlay" onclick="Utils.closeSidebar()"></div>
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>&#127793; 남원시 농촌관광</h2>
        <div class="user-info" id="userInfo">관리자</div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-section">관리</div>
        <a class="nav-item" href="dashboard.html"><span class="icon">&#128202;</span> 대시보드</a>
        <a class="nav-item" href="business-manage.html"><span class="icon">&#127970;</span> 경영체 관리</a>
        <a class="nav-item active" href="program-manage.html"><span class="icon">&#127915;</span> 프로그램 관리</a>
        <div class="nav-section">견적/청구</div>
        <a class="nav-item" href="estimate-review.html"><span class="icon">&#128196;</span> 견적서 검토</a>
        <a class="nav-item" href="invoice-review.html"><span class="icon">&#128203;</span> 청구서 검토</a>
        <div class="nav-section">정산</div>
        <a class="nav-item" href="payment-manage.html"><span class="icon">&#128179;</span> 프로그램비 지급</a>
        <a class="nav-item" href="marketing-fee.html"><span class="icon">&#128176;</span> 공동마케팅비</a>
        <a class="nav-item" href="membership-fee.html"><span class="icon">&#128181;</span> 회비 관리</a>
        <div class="nav-section">기타</div>
        <a class="nav-item" href="event-manage.html"><span class="icon">&#128197;</span> 행사 관리</a>
      </div>
    </nav>

    <div class="main-content">
      <header class="top-header">
        <div class="d-flex align-center gap-1">
          <button class="menu-toggle" onclick="Utils.toggleSidebar()">&#9776;</button>
          <span class="page-title">프로그램 관리</span>
        </div>
        <div class="header-actions">
          <button class="btn btn-outline btn-sm" onclick="Auth.logout()">로그아웃</button>
        </div>
      </header>

      <div class="page-content">
        <!-- 탭: 숙박/체험/식사 -->
        <div class="tabs">
          <div class="tab active" data-type="" onclick="switchTab(this)">전체</div>
          <div class="tab" data-type="숙박" onclick="switchTab(this)">숙박</div>
          <div class="tab" data-type="체험" onclick="switchTab(this)">체험</div>
          <div class="tab" data-type="식사" onclick="switchTab(this)">식사</div>
        </div>

        <div class="filter-bar">
          <div class="search-input">
            <input type="text" id="searchInput" placeholder="프로그램명, 경영체명으로 검색..." onkeyup="filterList()">
          </div>
          <select class="form-control" style="width:auto;min-width:150px" id="filterBusiness" onchange="filterList()">
            <option value="">전체 경영체</option>
          </select>
          <button class="btn btn-primary" onclick="openAddModal()">+ 프로그램 등록</button>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>프로그램 목록 (<span id="totalCount">0</span>건)</h3>
          </div>
          <div class="card-body">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>프로그램ID</th>
                    <th>경영체명</th>
                    <th>유형</th>
                    <th>프로그램명</th>
                    <th>정가</th>
                    <th>지원금(30%)</th>
                    <th>관광객부담(70%)</th>
                    <th>인원</th>
                    <th>상태</th>
                    <th>관리</th>
                  </tr>
                </thead>
                <tbody id="programList">
                  <tr><td colspan="10" class="text-center text-muted">데이터를 불러오는 중...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 프로그램 등록/수정 모달 -->
  <div class="modal-overlay" id="programModal">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h3 id="modalTitle">프로그램 등록</h3>
        <button class="modal-close" onclick="Utils.closeModal('programModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="programForm">
          <input type="hidden" name="프로그램ID" id="editProgramId">

          <div class="form-group">
            <label class="required">경영체</label>
            <select name="경영체ID" class="form-control" required id="modalBusinessSelect">
              <option value="">경영체를 선택하세요</option>
            </select>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <div class="form-group" style="flex:1;min-width:150px">
              <label class="required">프로그램 유형</label>
              <select name="프로그램유형" class="form-control" required>
                <option value="">선택</option>
                <option value="숙박">숙박</option>
                <option value="체험">체험</option>
                <option value="식사">식사</option>
              </select>
            </div>
            <div class="form-group" style="flex:2;min-width:200px">
              <label class="required">프로그램명</label>
              <input type="text" name="프로그램명" class="form-control" required placeholder="예: 한옥 숙박 체험">
            </div>
          </div>

          <div class="form-group">
            <label>설명</label>
            <textarea name="설명" class="form-control" rows="2" placeholder="프로그램 상세 설명"></textarea>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <div class="form-group" style="flex:1;min-width:120px">
              <label class="required">정가 (원)</label>
              <input type="number" name="정가" class="form-control" required placeholder="100000" oninput="calcAmounts()">
            </div>
            <div class="form-group" style="flex:1;min-width:120px">
              <label>지원금 (30%)</label>
              <input type="text" id="calcSupport" class="form-control" readonly style="background:#f5f5f5">
            </div>
            <div class="form-group" style="flex:1;min-width:120px">
              <label>관광객부담 (70%)</label>
              <input type="text" id="calcTourist" class="form-control" readonly style="background:#f5f5f5">
            </div>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <div class="form-group" style="flex:1;min-width:100px">
              <label>최소인원</label>
              <input type="number" name="최소인원" class="form-control" placeholder="1" min="1">
            </div>
            <div class="form-group" style="flex:1;min-width:100px">
              <label>최대인원</label>
              <input type="number" name="최대인원" class="form-control" placeholder="10" min="1">
            </div>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <div class="form-group" style="flex:1;min-width:150px">
              <label>운영 시작일</label>
              <input type="date" name="운영기간시작" class="form-control">
            </div>
            <div class="form-group" style="flex:1;min-width:150px">
              <label>운영 종료일</label>
              <input type="date" name="운영기간종료" class="form-control">
            </div>
          </div>

          <div class="form-group">
            <label>상태</label>
            <select name="상태" class="form-control">
              <option value="활성">활성</option>
              <option value="비활성">비활성</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="Utils.closeModal('programModal')">취소</button>
        <button class="btn btn-primary" onclick="saveProgram()">저장</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (!Auth.requireAuth('admin')) window.location.href = '../login.html';
    document.getElementById('userInfo').textContent = Auth.getUserName() + ' (관리자)';

    let allPrograms = [];
    let allBusinesses = [];
    let currentTypeFilter = '';

    async function loadData() {
      try {
        const [progResult, bizResult] = await Promise.all([
          API.getProgramList(),
          API.getBusinessList()
        ]);
        allPrograms = progResult.data || [];
        allBusinesses = bizResult.data || [];

        // 경영체 필터 셀렉트 채우기
        const filterSelect = document.getElementById('filterBusiness');
        const modalSelect = document.getElementById('modalBusinessSelect');
        allBusinesses.filter(b => b['상태'] === '활성').forEach(b => {
          filterSelect.innerHTML += `<option value="${b['경영체ID']}">${b['경영체명']}</option>`;
          modalSelect.innerHTML += `<option value="${b['경영체ID']}">${b['경영체명']}</option>`;
        });

        renderList(allPrograms);
      } catch (error) {
        console.error('데이터 로드 실패:', error);
        document.getElementById('programList').innerHTML =
          '<tr><td colspan="10" class="text-center text-muted">API 연결 후 데이터가 표시됩니다.</td></tr>';
      }
    }

    function getBusinessName(businessId) {
      const biz = allBusinesses.find(b => b['경영체ID'] === businessId);
      return biz ? biz['경영체명'] : businessId;
    }

    function renderList(data) {
      document.getElementById('totalCount').textContent = data.length;
      const tbody = document.getElementById('programList');

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted">등록된 프로그램이 없습니다.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(p => `
        <tr>
          <td>${p['프로그램ID']}</td>
          <td>${getBusinessName(p['경영체ID'])}</td>
          <td><span class="badge badge-${p['프로그램유형']==='숙박'?'info':p['프로그램유형']==='체험'?'success':'warning'}">${p['프로그램유형']}</span></td>
          <td><strong>${p['프로그램명']}</strong></td>
          <td class="text-right">${Utils.formatCurrency(p['정가'])}</td>
          <td class="text-right text-success">${Utils.formatCurrency(p['지원금액'])}</td>
          <td class="text-right">${Utils.formatCurrency(p['관광객부담금'])}</td>
          <td>${p['최소인원']||'-'}~${p['최대인원']||'-'}명</td>
          <td>${Utils.getBadgeHtml(p['상태'])}</td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="editProgram('${p['프로그램ID']}')">수정</button>
          </td>
        </tr>
      `).join('');
    }

    function switchTab(el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentTypeFilter = el.dataset.type;
      filterList();
    }

    function filterList() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const bizFilter = document.getElementById('filterBusiness').value;

      let filtered = allPrograms;
      if (currentTypeFilter) filtered = filtered.filter(p => p['프로그램유형'] === currentTypeFilter);
      if (search) {
        filtered = filtered.filter(p =>
          (p['프로그램명'] || '').toLowerCase().includes(search) ||
          getBusinessName(p['경영체ID']).toLowerCase().includes(search)
        );
      }
      if (bizFilter) filtered = filtered.filter(p => p['경영체ID'] === bizFilter);

      renderList(filtered);
    }

    function calcAmounts() {
      const price = Number(document.querySelector('[name="정가"]').value) || 0;
      document.getElementById('calcSupport').value = Utils.formatCurrency(Utils.calcSupportAmount(price));
      document.getElementById('calcTourist').value = Utils.formatCurrency(Utils.calcTouristAmount(price));
    }

    function openAddModal() {
      document.getElementById('modalTitle').textContent = '프로그램 등록';
      document.getElementById('programForm').reset();
      document.getElementById('editProgramId').value = '';
      document.getElementById('calcSupport').value = '';
      document.getElementById('calcTourist').value = '';
      Utils.openModal('programModal');
    }

    function editProgram(programId) {
      const prog = allPrograms.find(p => p['프로그램ID'] === programId);
      if (!prog) return;
      document.getElementById('modalTitle').textContent = '프로그램 수정';
      Utils.fillForm('programForm', prog);
      document.getElementById('editProgramId').value = programId;
      calcAmounts();
      Utils.openModal('programModal');
    }

    async function saveProgram() {
      const data = Utils.getFormData('programForm');
      if (!data['경영체ID'] || !data['프로그램유형'] || !data['프로그램명'] || !data['정가']) {
        Utils.showToast('필수 항목을 입력하세요.', 'warning');
        return;
      }

      Utils.showLoading();
      try {
        await API.saveProgram(data);
        Utils.showToast(data['프로그램ID'] ? '수정되었습니다.' : '등록되었습니다.', 'success');
        Utils.closeModal('programModal');
        allPrograms = [];
        const result = await API.getProgramList();
        allPrograms = result.data || [];
        filterList();
      } catch (error) {
        Utils.showToast(error.message, 'error');
      } finally {
        Utils.hideLoading();
      }
    }

    loadData();
  </script>
</body>
</html>
